<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1B3A6B 0%, #0d2245 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .app-name {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .app-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.65);
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: rgba(255,255,255,0.3);
            margin: 8px auto;
        }

        .province-name {
            font-size: 15px;
            color: rgba(255,255,255,0.85);
            text-align: center;
            font-weight: 500;
        }

        .loading-bar-container {
            width: 220px;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            margin-top: 32px;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4fc3f7, #81d4fa);
            border-radius: 4px;
            animation: load 1.8s ease-in-out forwards;
        }

        @keyframes load {
            0%   { width: 0%; }
            60%  { width: 75%; }
            100% { width: 100%; }
        }

        .version {
            position: absolute;
            bottom: 16px;
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.5px;
        }

        .mohcc-badge {
            margin-top: 20px;
            padding: 4px 14px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.8px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo-icon">🏥</div>
        <div class="app-name">MatSouth Vacancy Tracker</div>
        <div class="divider"></div>
        <div class="province-name">Matabeleland South Province</div>
        <div class="app-subtitle">Health Establishment Vacancy System</div>
        <div class="mohcc-badge">MOHCC · Provincial Medical Directorate</div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
    </div>
    <div class="version">Tesl@hTee Technologies · v1.0.0</div>
</body>
</html>
