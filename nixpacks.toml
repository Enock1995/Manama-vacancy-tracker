# nixpacks.toml — project root
# config:clear is intentionally placed BEFORE config:cache to prevent
# the MissingAppKeyException caused by a stale cached config from a
# previous deployment where APP_KEY was not yet set.

[phases.setup]
nixPkgs = ['nodejs_20']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader --no-interaction',
    'npm ci --prefix frontend'
]

[phases.build]
cmds = [
    # Build React SPA and merge into Laravel public/
    'npm run build --prefix frontend',
    'cp -r frontend/dist/* public/',

    # Ensure required storage directories exist on fresh containers
    'mkdir -p storage/app/public storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache',
    'chmod -R 775 storage bootstrap/cache'
]

[start]
# config:clear FIRST — deletes any stale bootstrap/cache/config.php from previous deploys
# config:cache SECOND — re-caches with the correct APP_KEY now available from Railway env vars
cmd = 'php artisan config:clear && php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT'